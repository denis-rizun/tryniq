x-common: &common
  env_file:
    - .env
  networks:
    - tryniq-network

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 10s
  timeout: 5s
  retries: 5

services:
  postgres:
    image: pgvector/pgvector:pg18
    <<: *common
    logging: *default-logging
    expose:
      - "${POSTGRES_PORT}"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    volumes:
      - postgres-tryniq-data:/var/lib/postgresql/18/data
    healthcheck:
      <<: *healthcheck-defaults
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}" ]
      start_period: 10s
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"

  api:
    <<: [*common]
    image: tryniq-backend:dev
    build:
      context: .
      dockerfile: Dockerfile
    logging: *default-logging
    expose:
      - "${API_PORT}"
    depends_on:
#      migration:
#        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT}:${API_PORT}"

  migration:
    <<: [*common]
    image: tryniq-backend:dev
    command: ["migrate"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./alembic:/app/alembic:rw

  worker:
    <<: [*common]
    image: tryniq-backend:dev
    command: ["worker"]
    logging: *default-logging
    depends_on:
#      migration:
#        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - whisper-models:/home/appuser/.cache

  redis:
    image: redis:7-alpine
    <<: *common
    logging: *default-logging
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "ping"]
    volumes:
      - redis-data:/data
    expose:
      - "6379"

  redis-insight:
    image: redis/redisinsight:latest
    <<: *common
    logging: *default-logging
    ports:
      - "5540:5540"
    volumes:
      - redis_insight_data:/data
    depends_on:
      redis:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    networks:
      - tryniq-network
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: tryniq
      MINIO_ROOT_PASSWORD: tryniq-secret
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 20

  langfuse-postgres-init:
    image: pgvector/pgvector:pg18
    networks:
      - tryniq-network
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      psql -h postgres -U ${POSTGRES_USER} -tc \"SELECT 1 FROM pg_database WHERE datname='langfuse'\" | grep -q 1 ||
      psql -h postgres -U ${POSTGRES_USER} -c \"CREATE DATABASE langfuse\"
      "
    restart: "no"

  clickhouse:
    image: clickhouse/clickhouse-server:24
    networks:
      - tryniq-network
    logging: *default-logging
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]

  langfuse-web:
    image: langfuse/langfuse:3
    networks:
      - tryniq-network
    logging: *default-logging
    depends_on:
      langfuse-postgres-init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment: &langfuse-env
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/langfuse
      DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/langfuse
      SALT: ${LANGFUSE_SALT:-mysalt}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-mysecret}
      TELEMETRY_ENABLED: "false"
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_AUTH: ""
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: ${LANGFUSE_S3_BUCKET:-langfuse}
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: ${MINIO_ENDPOINT_URL}
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: "events/"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: ${LANGFUSE_S3_BUCKET:-langfuse}
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: ${MINIO_ENDPOINT_URL}
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: "media/"
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-tryniq}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-Tryniq}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-tryniq}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-tryniq}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${AI_LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${AI_LANGFUSE_SECRET_KEY:-}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-admin@tryniq.local}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-admin}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-changeme123}

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    networks:
      - tryniq-network
    logging: *default-logging
    depends_on:
      langfuse-web:
        condition: service_started
    environment:
      <<: *langfuse-env

volumes:
  postgres-tryniq-data:
  redis-data:
  redis_insight_data:
  minio-data:
  redis-insight-data:
  whisper-models:
  clickhouse-data:
  clickhouse-logs:


networks:
  tryniq-network:
    driver: bridge
