x-common: &common
  env_file:
    - .env
  networks:
    - tryniq-network

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 10s
  timeout: 5s
  retries: 5

services:
  postgres:
    image: pgvector/pgvector:pg18
    <<: *common
    logging: *default-logging
    expose:
      - "${POSTGRES_PORT}"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    volumes:
      - postgres-tryniq-data:/var/lib/postgresql/18/data
    healthcheck:
      <<: *healthcheck-defaults
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}" ]
      start_period: 10s
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"

  migration:
    <<: [*common]
    build:
      context: .
      dockerfile: Dockerfile
    command: ["migrate"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./alembic:/app/alembic:rw

  api:
    <<: [*common]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        API_PORT: ${API_PORT}
    logging: *default-logging
    expose:
      - "${API_PORT}"
    depends_on:
      migration:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${API_PORT}:${API_PORT}"

  minio:
    image: minio/minio:latest
    networks:
      - tryniq-network
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: tryniq
      MINIO_ROOT_PASSWORD: tryniq-secret
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  postgres-tryniq-data:
  redis-data:
  minio-data:
  redis-insight-data:


networks:
  tryniq-network:
    driver: bridge
